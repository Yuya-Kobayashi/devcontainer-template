# Minimal egress proxy for the devcontainer.
#
# CONNECT-only forward proxy on 127.0.0.1:3128. Allowed destinations are listed
# by FQDN in /etc/squid/allowed-domains.acl. iptables (see devc-init-firewall.sh)
# blocks every other outbound path, so all egress must come through here.

http_port 127.0.0.1:3128

visible_hostname devc-devcontainer
via off
forwarded_for delete
httpd_suppress_version_string on

# FQDN allowlist. Leading-dot entries match the bare host and all subdomains
# (e.g. .github.com covers github.com, api.github.com, codeload.github.com).
acl allowed_domains dstdomain "/etc/squid/allowed-domains.acl"

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports
http_access allow allowed_domains
http_access deny all

# Pure forwarder — no caching.
cache deny all

pid_filename /var/run/squid.pid
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
